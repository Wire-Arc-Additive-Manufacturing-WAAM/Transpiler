services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: nibebee
      POSTGRES_PASSWORD: nibebee
      POSTGRES_DB: nibebee
    ports:
      - "5433:5432"
    volumes:
      - nibebee_pg:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  nibebee_pg:
